server:
  port: 7860
  address: 0.0.0.0

spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  ai:
    google:
      genai:
        chat:
          options:
            model: gemini-3.5-flash
            temperature: 0.5

    vertex:
      ai:
        gemini:
          chat:
            options:
              model: gemini-3.5-flash
              temperature: 0.5

    embedding:
      transformer:
        enabled: true
        cache:
          enabled: false
        onnx:
          model-uri: file:/app/onnx/model.onnx
          tokenizer:
            uri: file:/app/onnx/tokenizer.json

gemini:
  api:
    key: ${GEMINI_API_KEY}
    base-url: https://generativelanguage.googleapis.com/v1beta
    model: ${GEMINI_MODEL:gemini-3.5-flash}

chroma:
  api:
    url: ${CHROMA_API_URL}
  collection-name: gitscope_chunks

rag:
  top-k: ${TOP_K_RESULTS:12}
  max-chunk-size: 1500
  chunk-overlap: 200

github:
  clone-dir: ${CLONE_DIR:./tmp/repos}
  max-file-size-mb: ${MAX_FILE_SIZE_MB:20}
  max-files: ${MAX_FILES:500}

logging:
  level:
    com.gitscope: INFO
    org.springframework: WARN
    org.springframework.ai: INFO
