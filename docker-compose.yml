version: "3.9"

services:
  # ─── ChromaDB Vector Store ─────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: gitscope-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8000"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: gitscope-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB:       gitscope
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gitscope"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Spring Boot Backend ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gitscope-backend
    ports:
      - "8080:8080"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL:   ${GEMINI_MODEL:-gemini-2.5-flash}
      SPRING_DATASOURCE_URL:      jdbc:postgresql://postgres:5432/gitscope
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      CHROMA_API_URL: http://chromadb:8000
      TOP_K_RESULTS:  5
      CLONE_DIR:      /app/tmp/repos
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - repo_clones:/app/tmp/repos

volumes:
  chroma_data:
  postgres_data:
  repo_clones:
